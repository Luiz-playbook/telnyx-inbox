<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Companies</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="./theme.css" rel="stylesheet" />
  <style> html,body{height:100%} </style>
</head>
<body class="h-full">
  <div class="flex flex-col h-screen bg-base-200">
    <header class="shrink-0">
      <div class="pb-topbar flex items-center gap-4 px-5 h-14">
        <img src="./assets/pb-logo-navbar.png" alt="Playbook" class="h-7 w-auto" />
        <span class="text-white/70 text-sm font-semibold hidden sm:inline">Messaging</span>
      </div>
      <nav class="pb-tabs px-5">
        <a href="./index.html">Inbox</a>
        <a href="./companies.html" class="active">Companies</a>
        <a href="./events.html">Events</a>
        <a href="./campaigns.html">Campaigns</a>
        <a href="./templates.html">Templates</a>
        <a href="./bulk.html">Recipients</a>
        <a href="./lookup.html">Checker</a>
      </nav>
    </header>

    <div class="flex flex-1 min-h-0">
      <aside class="w-80 shrink-0 border-r border-base-300 bg-base-100 flex flex-col">
        <div class="px-4 pt-4 pb-1">
          <h1 class="text-xl font-bold">Companies</h1>
          <div class="text-xs text-base-content/60" id="count">—</div>
        </div>
        <div class="px-4 py-2"><input id="search-input" class="input input-bordered input-sm w-full" placeholder="Search name or domain…"></div>
        <div id="rows" class="overflow-y-auto flex-1"><div class="p-6 text-center text-base-content/50">Loading…</div></div>
      </aside>
      <main class="flex-1 overflow-y-auto" id="detail">
        <div class="h-full flex items-center justify-center text-base-content/50">Select a company to view its profile</div>
      </main>
    </div>
  </div>
  <div class="toast toast-end" id="toast-wrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script>
    const cfg = window.INBOX_CONFIG || {};
    const sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    const el = (id) => document.getElementById(id);
    const TABLE = 'enriched_prospects';
    const PAGE = 50;
    const state = { items: [], activeId: null, filter: '', limit: PAGE, total: 0 };
    const SECTIONS = ['organization_info','classification','scale_and_volume','contacts','pricing','revenue','sponsorship','fundraising','martech_stack','pride_and_values','registration_and_domains'];
    const BIG = ['pages_analyzed','raw_data'];

    function toast(m,t='err'){ const cls={ok:'alert-success',err:'alert-error',info:'alert-info'}[t]; const d=document.createElement('div'); d.className=`alert ${cls} shadow`; d.innerHTML=`<span>${esc(m)}</span>`; el('toast-wrap').appendChild(d); setTimeout(()=>d.remove(),3000); }
    function esc(s){ return (s??'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function humanize(k){ return k.replace(/_/g,' ').replace(/^\w/,c=>c.toUpperCase()); }
    function withHttp(u){ return /^https?:\/\//i.test(u)?u:'https://'+u; }
    function isEmpty(v){ return v===null||v===undefined||v===''||(Array.isArray(v)&&!v.length)||(typeof v==='object'&&!Array.isArray(v)&&!Object.keys(v).length); }
    const debounce=(fn,ms)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};};

    function renderValue(v){
      if(isEmpty(v))return '<span class="text-base-content/40">—</span>';
      if(typeof v==='boolean')return v?'Yes':'No';
      if(Array.isArray(v)){ if(v.every(x=>x===null||typeof x!=='object'))return '<div class="flex flex-wrap gap-1.5">'+v.map(x=>`<span class="badge badge-ghost">${esc(x)}</span>`).join('')+'</div>';
        return v.map(x=>`<div class="rounded-lg border border-base-300 bg-base-200 p-2.5 mb-2">${renderValue(x)}</div>`).join(''); }
      if(typeof v==='object'){ const rows=Object.entries(v).filter(([,val])=>!isEmpty(val)).map(([k,val])=>`<div class="grid grid-cols-[190px_1fr] gap-3 items-start py-1"><div class="text-sm text-base-content/60">${esc(humanize(k))}</div><div>${renderValue(val)}</div></div>`).join(''); return `<div>${rows}</div>`; }
      return esc(v);
    }
    function sectionCard(title,val){ return isEmpty(val)?'':`<div class="card bg-base-100 border border-base-300 mb-3"><div class="card-body p-4"><div class="text-xs font-bold uppercase text-base-content/60 mb-2">${esc(title)}</div>${renderValue(val)}</div></div>`; }

    async function loadList(){
      let q=sb.from(TABLE).select('id,organization_name,primary_domain,competitor_source_sheet,classification,created_at',{count:'estimated'}).order('organization_name',{ascending:true,nullsFirst:false}).range(0,state.limit-1);
      const f=state.filter.replace(/[,()*%]/g,'').trim();
      if(f)q=q.or(`organization_name.ilike.*${f}*,primary_domain.ilike.*${f}*`); else q=q.not('organization_name','is',null).neq('organization_name','');
      const {data,error,count}=await q; if(error){toast('Load failed: '+error.message);return;}
      state.items=data||[]; state.total=count??state.items.length; renderList();
    }
    function renderList(){
      el('count').textContent=state.filter?`${state.items.length} shown`:`Showing ${state.items.length} of ~${state.total.toLocaleString()}`;
      const box=el('rows'); if(!state.items.length){box.innerHTML='<div class="p-6 text-center text-base-content/50">No companies found</div>';return;}
      let html=state.items.map(c=>{ const cls=c.classification||{}; const tier=cls.tier?` · ${esc(cls.tier)}`:''; const comp=cls.competitor_detected?' <span class="badge badge-error badge-xs">comp</span>':'';
        return `<div class="px-4 py-3 border-b border-base-200 cursor-pointer hover:bg-base-200 ${c.id===state.activeId?'bg-primary/10':''}" data-id="${c.id}"><div class="font-semibold">${esc(c.organization_name||'(unnamed)')}${comp}</div><div class="text-xs text-base-content/60 truncate">${esc(c.primary_domain||'—')}${tier}</div></div>`; }).join('');
      if(state.items.length>=state.limit)html+=`<div class="m-4 btn btn-sm btn-outline" id="more">Load more</div>`;
      box.innerHTML=html; box.querySelectorAll('[data-id]').forEach(n=>n.addEventListener('click',()=>open(n.dataset.id)));
      if(el('more'))el('more').addEventListener('click',()=>{state.limit+=PAGE;loadList();});
    }
    async function open(id){
      state.activeId=id; renderList(); el('detail').innerHTML='<div class="h-full flex items-center justify-center"><span class="loading loading-spinner"></span></div>';
      const {data:c,error}=await sb.from(TABLE).select('*').eq('id',id).single();
      if(error){el('detail').innerHTML='<div class="p-8 text-center text-base-content/50">Failed to load: '+esc(error.message)+'</div>';return;}
      const cls=c.classification||{}; const tier=cls.tier?`<span class="badge badge-primary">${esc(cls.tier)}</span>`:''; const comp=cls.competitor_detected?`<span class="badge badge-error">competitor${cls.competitor_platform?': '+esc(cls.competitor_platform):''}</span>`:''; const src=c.competitor_source_sheet?`<span class="badge badge-ghost">source: ${esc(c.competitor_source_sheet)}</span>`:'';
      const domain=c.primary_domain?`<a class="link link-primary" href="${esc(withHttp(c.primary_domain))}" target="_blank" rel="noopener">${esc(c.primary_domain)}</a>`:'';
      let html=`<div class="sticky top-0 z-10 bg-base-200/80 backdrop-blur border-b border-base-300 px-6 py-4"><h2 class="text-xl font-bold">${esc(c.organization_name||'—')}</h2><div class="flex gap-2 items-center flex-wrap mt-1 text-sm text-base-content/60">${domain}${tier}${comp}${src}</div></div><div class="p-6 max-w-4xl">`;
      SECTIONS.forEach(k=>html+=sectionCard(humanize(k),c[k]));
      if(c.txt_file_drive_url)html+=`<div class="card bg-base-100 border border-base-300 mb-3"><div class="card-body p-4"><div class="text-xs font-bold uppercase text-base-content/60 mb-1">Source file</div><a class="link link-primary" href="${esc(c.txt_file_drive_url)}" target="_blank" rel="noopener">Open scraped text</a></div></div>`;
      BIG.forEach(k=>{ if(!isEmpty(c[k]))html+=`<div class="collapse collapse-arrow bg-base-100 border border-base-300 mb-3"><input type="checkbox"><div class="collapse-title text-xs font-bold uppercase text-base-content/60">${esc(humanize(k))}</div><div class="collapse-content"><pre class="text-xs overflow-x-auto bg-base-200 p-3 rounded">${esc(JSON.stringify(c[k],null,2))}</pre></div></div>`; });
      const meta=[]; if(c.version)meta.push('Version: '+c.version); if(c.created_at)meta.push('Created: '+new Date(c.created_at).toLocaleString()); if(c.remarks)meta.push('Remarks: '+c.remarks);
      if(meta.length)html+=`<div class="text-xs text-base-content/40 mt-2">${esc(meta.join(' · '))}</div>`;
      html+='</div>'; el('detail').innerHTML=html;
    }
    el('search-input').addEventListener('input', debounce(e=>{state.filter=e.target.value;state.limit=PAGE;loadList();},300));
    if(!cfg.SUPABASE_URL||cfg.SUPABASE_URL.startsWith('<<')) toast('config.js is not filled in'); else loadList();
  </script>
</body>
</html>
