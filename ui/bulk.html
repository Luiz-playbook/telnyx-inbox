<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipients (Tailwind + DaisyUI demo)</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="./theme.css" rel="stylesheet" />
  <style> html,body{height:100%} </style>
</head>
<body class="h-full">
  <div class="flex flex-col h-screen bg-base-200">

    <!-- top nav -->
    <header class="shrink-0">
      <div class="pb-topbar flex items-center gap-4 px-5 h-14">
        <img src="./assets/pb-logo-navbar.png" alt="Playbook" class="h-7 w-auto" />
        <span class="text-white/70 text-sm font-semibold hidden sm:inline">Messaging</span>
      </div>
      <nav class="pb-tabs px-5">
        <a href="./index.html">Inbox</a>
        <a href="./companies.html">Companies</a>
        <a href="./events.html">Events</a>
        <a href="./campaigns.html">Campaigns</a>
        <a href="./templates.html">Templates</a>
        <a href="./bulk.html" class="active">Recipients</a>
        <a href="./lookup.html">Checker</a>
      </nav>
    </header>

    <div class="flex flex-1 min-h-0">
      <!-- list column -->
      <aside class="w-80 shrink-0 border-r border-base-300 bg-base-100 flex flex-col">
        <div class="p-4 flex items-center justify-between">
          <h1 class="text-xl font-bold">Recipients</h1>
          <button class="btn btn-primary btn-sm" id="new-btn">+ New</button>
        </div>
        <ul class="menu px-2 overflow-y-auto flex-1" id="rows">
          <li class="px-2 py-6 text-center text-base-content/50">Loading…</li>
        </ul>
      </aside>

      <!-- editor column -->
      <main class="flex-1 overflow-y-auto" id="editor">
        <div class="h-full flex items-center justify-center text-base-content/50">Select a recipient list, or click + New</div>
      </main>
    </div>
  </div>

  <!-- confirm send modal -->
  <dialog id="send-modal" class="modal">
    <div class="modal-box">
      <h3 class="font-bold text-lg">Send this campaign?</h3>
      <p class="py-3 text-base-content/70" id="send-modal-text"></p>
      <div class="modal-action">
        <form method="dialog"><button class="btn">Cancel</button></form>
        <button class="btn btn-success" id="send-go">Send now</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <!-- toast -->
  <div class="toast toast-end" id="toast-wrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script>
    const cfg = window.INBOX_CONFIG || {};
    const sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    const el = (id) => document.getElementById(id);
    const state = { lists: [], templates: [], numbers: [], activeId: null, draft: null, csv: null };
    function activeFrom(){ return localStorage.getItem('active_telnyx_number') || (state.numbers[0] && state.numbers[0].phone_number) || '+16158050766'; }

    function toast(msg, type='info'){
      const cls = { ok:'alert-success', err:'alert-error', info:'alert-info' }[type] || 'alert-info';
      const d = document.createElement('div'); d.className = `alert ${cls} shadow`; d.innerHTML = `<span>${esc(msg)}</span>`;
      el('toast-wrap').appendChild(d); setTimeout(()=>d.remove(), 3000);
    }
    function esc(s){ return (s??'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function renderTpl(body, v){ return (body||'').replace(/\{\{\s*(\w+)\s*\}\}/g,(_,k)=> (v[k] ?? '')); }
    function parseRecipients(text){ const out=[]; (text||'').split(/\r?\n/).forEach(line=>{ line=line.trim(); if(!line)return; let name='',phone=line; const c=line.lastIndexOf(','); if(c>-1){name=line.slice(0,c).trim();phone=line.slice(c+1).trim();} out.push({name,phone:normPhone(phone)}); }); return out; }
    function normPhone(p){ let d=(p||'').replace(/[^\d+]/g,''); if(d&&d[0]!=='+'){ if(d.length===10)d='+1'+d; else if(d.length===11&&d[0]==='1')d='+'+d; } return d; }
    function isValidPhone(p){ return /^\+\d{10,15}$/.test(p||''); }
    function firstName(n){ return (n||'').trim().split(/\s+/)[0]||''; }
    function recToVars(r){ return { name:r.name||'', first_name:firstName(r.name), phone:r.phone||'' }; }
    function recipientsToText(recs){ return (recs||[]).map(r=> r.name ? `${r.name}, ${r.phone}` : r.phone).join('\n'); }

    async function loadAll(){
      const [{data:lists,error:e1},{data:tpls,error:e2},{data:nums}] = await Promise.all([
        sb.from('recipient_lists').select('*').order('updated_at',{ascending:false}),
        sb.from('message_templates').select('*').order('name',{ascending:true}),
        sb.from('telnyx_numbers').select('*').eq('active',true).order('sort_order'),
      ]);
      if (e1) { toast('Load failed: '+e1.message,'err'); return; }
      state.lists=lists||[]; state.templates=tpls||[]; state.numbers=nums||[]; renderList();
    }
    function renderList(){
      const box=el('rows');
      if(!state.lists.length){ box.innerHTML='<li class="px-2 py-6 text-center text-base-content/50">No recipient lists yet</li>'; return; }
      box.innerHTML = state.lists.map(l=>`
        <li><a class="${l.id===state.activeId?'active':''} flex-col items-start gap-0" data-id="${l.id}">
          <span class="font-semibold">${esc(l.name)}</span>
          <span class="text-xs text-base-content/60">${(l.recipients||[]).length} recipient(s)</span>
        </a></li>`).join('');
      box.querySelectorAll('a[data-id]').forEach(n=>n.addEventListener('click',()=>open(n.dataset.id)));
    }
    function newItem(){ state.activeId=null; state.draft={name:'',recipients:[]}; renderList(); renderEditor(); }
    function open(id){ const l=state.lists.find(x=>x.id===id); if(!l)return; state.activeId=id; state.draft={name:l.name,recipients:Array.isArray(l.recipients)?l.recipients:[]}; renderList(); renderEditor(); }

    function renderEditor(){
      if(!state.draft){ el('editor').innerHTML='<div class="h-full flex items-center justify-center text-base-content/50">Select a recipient list, or click + New</div>'; return; }
      const isNew=!state.activeId; const recs=state.draft.recipients||[];
      el('editor').innerHTML = `
        <div class="sticky top-0 z-10 bg-base-200/80 backdrop-blur border-b border-base-300 px-6 py-4 flex items-center justify-between">
          <h2 class="text-lg font-bold">${isNew?'New recipient list':esc(state.draft.name||'List')}</h2>
          <div class="flex gap-2">
            ${isNew?'':'<button class="btn btn-sm btn-outline btn-error" id="del">Delete</button>'}
            <button class="btn btn-sm btn-primary" id="save">${isNew?'Create':'Save'}</button>
          </div>
        </div>
        <div class="p-6 max-w-3xl space-y-5">
          <div class="form-control">
            <label class="label"><span class="label-text font-semibold">List name</span></label>
            <input id="f-name" class="input input-bordered" value="${esc(state.draft.name)}" placeholder="e.g. Fall camp leads">
          </div>

          <div class="card bg-base-100 border border-base-300">
            <div class="card-body gap-3 p-4">
              <div class="flex items-center gap-3">
                <label class="btn btn-sm btn-outline">Import CSV<input type="file" accept=".csv,text/csv" id="f-csv" class="hidden"></label>
                <span class="text-sm text-base-content/60" id="csvhint"></span>
              </div>
              <div id="csvpanel" class="hidden"></div>
              <div class="form-control">
                <label class="label"><span class="label-text font-semibold">Recipients</span><span class="label-text-alt" id="reccount"></span></label>
                <textarea id="f-recs" class="textarea textarea-bordered font-mono text-sm min-h-40" placeholder="Jordan Smith, +16155550142">${esc(recipientsToText(recs))}</textarea>
              </div>
              <div class="flex items-center gap-3 flex-wrap">
                <button class="btn btn-sm btn-outline" id="classify">Classify mobile / landline</button>
                <span class="text-sm text-base-content/60" id="classify-status"></span>
              </div>
              <div class="text-sm" id="classify-summary"></div>
            </div>
          </div>

          <div class="card bg-base-100 border border-base-300">
            <div class="card-body gap-3 p-4">
              <h3 class="font-bold">Send to these recipients</h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div class="form-control"><label class="label"><span class="label-text">Template</span></label>
                  <select id="tpl" class="select select-bordered"><option value="">— choose a template —</option>${state.templates.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div>
                <div class="form-control"><label class="label"><span class="label-text">Send from</span></label>
                  <select id="from-num" class="select select-bordered">${state.numbers.map(n=>`<option value="${esc(n.phone_number)}" ${n.phone_number===activeFrom()?'selected':''}>${n.label?esc(n.label)+' · ':''}${esc(n.phone_number)}</option>`).join('')||'<option value="">No numbers</option>'}</select></div>
              </div>
              <div class="rounded-lg bg-base-200 p-3 text-sm whitespace-pre-wrap" id="pv">—</div>
              <button class="btn btn-success w-full" id="send">Send to <span id="sendn" class="mx-1 font-bold">0</span> recipient(s)</button>
              <div class="text-xs text-base-content/60">${(!cfg.BULK_SEND_WEBHOOK_URL||cfg.BULK_SEND_WEBHOOK_URL.startsWith('<<'))?'Sending isn’t wired yet (BULK_SEND_WEBHOOK_URL).':'Tip: save the list first if it’s new.'}</div>
            </div>
          </div>
        </div>`;
      el('f-name').addEventListener('input', e=>{ state.draft.name=e.target.value; });
      el('f-recs').addEventListener('input', e=>{ state.draft.recipients=parseRecipients(e.target.value); refreshCounts(); refreshSend(); });
      el('f-csv').addEventListener('change', onCsvFile);
      el('save').addEventListener('click', save);
      if(el('del')) el('del').addEventListener('click', del);
      el('classify').addEventListener('click', classifyRecipients);
      el('tpl').addEventListener('change', refreshSend);
      el('from-num').addEventListener('change', ()=>localStorage.setItem('active_telnyx_number', el('from-num').value));
      el('send').addEventListener('click', openSendModal);
      refreshCounts(); showClassifySummary(); refreshSend();
    }
    function refreshCounts(){ const recs=state.draft.recipients||[]; const valid=recs.filter(r=>isValidPhone(r.phone)).length, bad=recs.length-valid;
      el('reccount').innerHTML=`${recs.length} line(s) · <b>${valid} valid</b>${bad?` · <span class="text-error">${bad} invalid</span>`:''}`; }

    async function save(){
      if(!state.draft.name.trim()){ toast('List name is required','err'); return; }
      const payload={name:state.draft.name.trim(),recipients:state.draft.recipients||[]}; const btn=el('save'); btn.disabled=true;
      try{
        if(state.activeId){ const {error}=await sb.from('recipient_lists').update(payload).eq('id',state.activeId); if(error)throw error; toast('Saved','ok'); }
        else{ const {data,error}=await sb.from('recipient_lists').insert(payload).select().single(); if(error)throw error; state.activeId=data.id; toast('Created','ok'); }
        await loadAll(); if(state.activeId) open(state.activeId);
      }catch(err){ toast('Save failed: '+err.message,'err'); } finally{ btn.disabled=false; }
    }
    async function del(){ if(!state.activeId||!confirm('Delete this list?'))return; const {error}=await sb.from('recipient_lists').delete().eq('id',state.activeId);
      if(error){ toast('Delete failed: '+error.message,'err'); return; } state.activeId=null; state.draft=null; await loadAll(); renderEditor(); toast('Deleted','ok'); }

    // CSV
    function csvToRows(text){ const rows=[];let row=[],cur='',q=false; for(let i=0;i<text.length;i++){const ch=text[i];
      if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else{ if(ch==='"')q=true; else if(ch===','){row.push(cur);cur='';} else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';} else if(ch==='\r'){} else cur+=ch; } }
      if(cur!==''||row.length){row.push(cur);rows.push(row);} return rows.filter(r=>r.some(c=>(c||'').trim()!=='')); }
    function parseCsv(text,h){ const arr=csvToRows(text.trim()); if(!arr.length)return{columns:[],rows:[]};
      if(h){ const cols=arr[0].map((c,i)=>(c||'').trim()||('Column '+(i+1))); return{columns:cols,rows:arr.slice(1).map(r=>{const o={};cols.forEach((c,i)=>o[c]=(r[i]??'').trim());return o;})}; }
      const w=arr.reduce((m,r)=>Math.max(m,r.length),0); const cols=Array.from({length:w},(_,i)=>'Column '+(i+1));
      return{columns:cols,rows:arr.map(r=>{const o={};cols.forEach((c,i)=>o[c]=(r[i]??'').trim());return o;})}; }
    function detectPhoneCol(p){ const bn=p.columns.find(c=>/phone|mobile|cell|\btel\b|number/i.test(c)); if(bn)return bn; let best=p.columns[0],s=-1; p.columns.forEach(c=>{let n=0;p.rows.slice(0,50).forEach(r=>{if(isValidPhone(normPhone(r[c])))n++;});if(n>s){s=n;best=c;}}); return best; }
    function detectNameCol(p){ return p.columns.find(c=>/name|company|organization|contact/i.test(c))||''; }
    async function onCsvFile(e){ const file=e.target.files[0]; if(!file)return; el('csvhint').textContent='Reading '+file.name+'…';
      try{ state.csv={name:file.name,text:await file.text(),hasHeader:true}; renderCsvPanel(); el('csvhint').textContent=file.name; }catch(err){ toast('Could not read CSV: '+err.message,'err'); } e.target.value=''; }
    function renderCsvPanel(){ const p=parseCsv(state.csv.text,state.csv.hasHeader); state.csv.columns=p.columns; state.csv.rows=p.rows;
      if(!p.columns.length){ toast('That CSV looks empty','err'); return; }
      const pg=detectPhoneCol(p),ng=detectNameCol(p); const opt=(sel)=>p.columns.map(c=>`<option value="${esc(c)}" ${c===sel?'selected':''}>${esc(c)}</option>`).join('');
      const panel=el('csvpanel'); panel.className='rounded-lg border border-base-300 bg-base-200 p-4 space-y-3';
      panel.innerHTML=`
        <div class="flex flex-wrap gap-3 items-end">
          <div class="form-control"><label class="label py-0"><span class="label-text text-xs">Phone column</span></label><select id="csv-phone" class="select select-bordered select-sm">${opt(pg)}</select></div>
          <div class="form-control"><label class="label py-0"><span class="label-text text-xs">Name column (optional)</span></label><select id="csv-name" class="select select-bordered select-sm"><option value="">— none —</option>${opt(ng)}</select></div>
          <label class="label cursor-pointer gap-2"><input type="checkbox" id="csv-header" class="checkbox checkbox-sm" ${state.csv.hasHeader?'checked':''}><span class="label-text text-sm">First row is a header</span></label>
        </div>
        <div class="text-sm text-base-content/70" id="csv-preview"></div>
        <div class="flex gap-2"><button class="btn btn-sm btn-primary" id="csv-import">Import <span id="csv-n" class="mx-1">0</span></button><button class="btn btn-sm btn-ghost" id="csv-cancel">Cancel</button></div>`;
      el('csv-phone').addEventListener('change',updateCsvPreview); el('csv-name').addEventListener('change',updateCsvPreview);
      el('csv-header').addEventListener('change',()=>{state.csv.hasHeader=el('csv-header').checked;renderCsvPanel();});
      el('csv-import').addEventListener('click',importCsv); el('csv-cancel').addEventListener('click',()=>{el('csvpanel').className='hidden';state.csv=null;el('csvhint').textContent='';});
      updateCsvPreview();
    }
    function buildCsvRecipients(){ const pc=el('csv-phone').value,nc=el('csv-name').value; return state.csv.rows.map(r=>({name:nc?(r[nc]||'').toString().trim():'',phone:normPhone((r[pc]||'').toString())})); }
    function updateCsvPreview(){ const recs=buildCsvRecipients(); const v=recs.filter(r=>isValidPhone(r.phone)).length; el('csv-n').textContent=v;
      const s=recs.find(r=>isValidPhone(r.phone)); el('csv-preview').innerHTML=`${state.csv.rows.length} row(s) · <b>${v} valid</b>`+(s?` · e.g. ${esc(s.name?s.name+' — ':'')}${esc(s.phone)}`:''); }
    function importCsv(){ const recs=buildCsvRecipients().filter(r=>r.phone); if(!recs.length){ toast('No phone values in that column','err'); return; }
      state.draft.recipients=(state.draft.recipients||[]).concat(recs); el('f-recs').value=recipientsToText(state.draft.recipients);
      el('csvpanel').className='hidden'; el('csvhint').textContent=`Imported ${recs.length} from ${state.csv.name}`; state.csv=null; refreshCounts(); refreshSend(); toast(`Imported ${recs.length} number(s)`,'ok'); }

    // classify
    async function lookupOne(number){ try{ const res=await fetch('/api/lookup?number='+encodeURIComponent(number),{headers:{'x-inbox-secret':cfg.REPLY_SECRET||''}}); const d=await res.json(); if(!res.ok)return{line_type:'error',textable:false}; return d; }catch(e){ return{line_type:'error',textable:false}; } }
    async function classifyRecipients(){ const recs=(state.draft.recipients||[]).filter(r=>isValidPhone(r.phone)); if(!recs.length){toast('No valid numbers','err');return;}
      if(location.protocol==='file:'){ toast('Classify runs on the deployed/served site','err'); return; }
      const btn=el('classify'),orig=btn.textContent; btn.disabled=true; btn.innerHTML='<span class="loading loading-spinner loading-xs"></span> Classifying…'; let done=0;
      const st=()=>el('classify-status').textContent=`${done}/${recs.length} checked`; st(); let i=0;
      async function w(){ while(true){ const idx=i++; if(idx>=recs.length)return; const r=recs[idx]; const info=await lookupOne(r.phone); r.line_type=info.line_type; r.textable=!!info.textable; done++; st(); } }
      await Promise.all(Array.from({length:Math.min(6,recs.length)},w)); btn.disabled=false; btn.textContent=orig; el('classify-status').textContent='Done'; showClassifySummary(); }
    function showClassifySummary(){ const box=el('classify-summary'); if(!box)return; const recs=(state.draft&&state.draft.recipients)||[]; const done=recs.filter(r=>r.line_type);
      if(!done.length){box.innerHTML='';return;} const mob=done.filter(r=>r.line_type==='mobile').length,land=done.filter(r=>r.line_type==='landline').length,voip=done.filter(r=>r.line_type==='voip').length;
      box.innerHTML=`<span class="badge badge-success gap-1">${mob} textable</span> <span class="badge badge-error">${land} landline</span> ${voip?`<span class="badge badge-warning">${voip} voip</span>`:''} ${mob<done.length?`<a href="#" id="keep-mobile" class="link link-primary ml-1">Keep only textable</a>`:''}`;
      const km=el('keep-mobile'); if(km)km.addEventListener('click',e=>{e.preventDefault(); state.draft.recipients=(state.draft.recipients||[]).filter(r=>r.line_type==='mobile'); el('f-recs').value=recipientsToText(state.draft.recipients); refreshCounts(); showClassifySummary(); refreshSend(); toast('Kept only textable','ok');}); }

    // send
    function refreshSend(){ const t=state.templates.find(x=>x.id===el('tpl').value); const recs=(state.draft.recipients||[]).filter(r=>isValidPhone(r.phone));
      if(el('sendn'))el('sendn').textContent=recs.length; if(el('pv'))el('pv').textContent=(t&&recs[0])?renderTpl(t.body,recToVars(recs[0])):(t?'(no valid recipient yet)':'—'); }
    function openSendModal(){ const t=state.templates.find(x=>x.id===el('tpl').value); if(!t){toast('Choose a template first','err');return;}
      const recs=(state.draft.recipients||[]).filter(r=>isValidPhone(r.phone)); if(!recs.length){toast('No valid recipients','err');return;}
      el('send-modal-text').innerHTML=`You’re about to text <b>${recs.length}</b> ${recs.length===1?'person':'people'} from ${activeFrom()}.`;
      el('send-modal').showModal(); }
    el('send-go').addEventListener('click', doSend);
    async function doSend(){ el('send-modal').close(); const t=state.templates.find(x=>x.id===el('tpl').value); const recs=(state.draft.recipients||[]).filter(r=>isValidPhone(r.phone));
      if(!cfg.BULK_SEND_WEBHOOK_URL||cfg.BULK_SEND_WEBHOOK_URL.startsWith('<<')){ toast('Sending isn’t wired yet','err'); return; }
      const from=el('from-num').value||activeFrom(); const messages=recs.map(r=>({from,to:r.phone,text:renderTpl(t.body,recToVars(r))}));
      const btn=el('send'); btn.disabled=true; btn.innerHTML='<span class="loading loading-spinner loading-sm"></span> Sending…';
      try{ const res=await fetch(cfg.BULK_SEND_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json','x-inbox-secret':cfg.REPLY_SECRET||''},body:JSON.stringify({from,list_id:state.activeId,template_id:t.id,messages})});
        if(!res.ok)throw new Error('HTTP '+res.status); toast(`Sent to ${messages.length} recipient(s)`,'ok'); }
      catch(err){ toast('Send failed: '+err.message,'err'); } finally{ btn.disabled=false; btn.innerHTML=`Send to <span id="sendn" class="mx-1 font-bold">${recs.length}</span> recipient(s)`; } }

    el('new-btn').addEventListener('click', newItem);
    if(!cfg.SUPABASE_URL||cfg.SUPABASE_URL.startsWith('<<')) toast('config.js is not filled in','err'); else loadAll();
  </script>
</body>
</html>
