<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Playbook Inbox</title>
  <style>
    :root { --blue:#2f6bff; --text:#1b2430; --muted:#7c8698; --border:#e6e9ee; --bg:#f7f8fa; }
    * { box-sizing:border-box; }
    html, body { height:100%; margin:0; }
    body { font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text); background:var(--bg); display:flex; align-items:center; justify-content:center; height:100vh; }
    .card { background:#fff; border:1px solid var(--border); border-radius:18px; padding:40px 36px; width:400px; max-width:92vw; text-align:center;
      box-shadow:0 10px 40px rgba(20,26,36,.06); }
    .logo { width:52px; height:52px; border-radius:14px; background:var(--blue); color:#fff; display:grid; place-items:center;
      font-weight:800; font-size:24px; margin:0 auto 18px; }
    h1 { font-size:20px; margin:0 0 6px; }
    p.sub { color:var(--muted); margin:0 0 26px; }
    .gbtn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:12px; border:1px solid var(--border);
      border-radius:11px; background:#fff; font:inherit; font-weight:600; cursor:pointer; }
    .gbtn:hover { background:#f5f7fb; }
    .gbtn img, .gbtn svg { width:18px; height:18px; }
    .foot { color:var(--muted); font-size:12px; margin-top:20px; }
    .msg { display:none; margin:0 0 18px; padding:10px 12px; border-radius:9px; font-size:13px; }
    .msg.err { background:#fde2e2; color:#92211f; display:block; }
    .spinner { display:inline-block; width:15px; height:15px; border:2px solid #888; border-top-color:transparent; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">P</div>
    <h1>Playbook Inbox</h1>
    <p class="sub">Sign in with your Playbook Google account</p>
    <div class="msg" id="msg"></div>
    <button class="gbtn" id="google">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      <span id="glabel">Continue with Google</span>
    </button>
    <div class="foot" id="foot"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script>
    const cfg = window.INBOX_CONFIG || {};
    const sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    const DOMAIN = cfg.ALLOWED_EMAIL_DOMAIN || 'callplaybook.com';
    const el = (id) => document.getElementById(id);
    el('foot').textContent = `Only @${DOMAIN} accounts are allowed.`;

    const params = new URLSearchParams(location.search);
    if (params.get('denied')) { const m=el('msg'); m.className='msg err'; m.textContent = `That account isn't a @${DOMAIN} address. Use your Playbook account.`; }

    (async () => {
      const { data:{ session } } = await sb.auth.getSession();
      if (session) location.replace('./index.html');
    })();

    el('google').addEventListener('click', async () => {
      el('glabel').innerHTML = '<span class="spinner"></span>';
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: location.origin + '/',
          queryParams: { hd: DOMAIN, prompt: 'select_account' }
        }
      });
      if (error) { const m=el('msg'); m.className='msg err'; m.textContent = error.message; el('glabel').textContent='Continue with Google'; }
    });
  </script>
</body>
</html>
